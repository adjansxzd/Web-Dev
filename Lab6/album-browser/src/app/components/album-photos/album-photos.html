
@if (loading) {
  <p>Loading photos...</p>
} @else {

  @if (photos.length === 0) {
    <p>No photos found.</p>
  } @else {

    <div class="grid">
      @for (photo of photos; track photo.id) {
        <div class="photo-card">
          <img [src]="photo.thumbnailUrl" />
          <p>{{ photo.title }}</p>
        </div>
      }
    </div>

  }

}

<button (click)="goBack()">Back</button>
